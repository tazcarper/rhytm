name: CI

# Runs on every pull request into main. Pair this with a branch-protection rule
# on `main` that requires this check to pass before merge — that, plus required
# review, is the gate that keeps client contributions safe.

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
